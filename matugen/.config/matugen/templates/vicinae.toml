# Vicinae Base16 Theme Template (Dark · Neutral)

[meta]
name = "Base16 Dark Neutral"
description = "Base16 colorscheme - dark neutral variant"
variant = "dark"

# ============================================================================
# Core Colors
# ============================================================================

[colors.core]
accent = "{{colors.base0D_source.default.hex}}"
accent_foreground = "{{colors.base00_source.default.hex}}"
background = "{{colors.base00_source.default.hex}}"
foreground = "{{colors.base05_source.default.hex}}"
secondary_background = "{{colors.base01_source.default.hex}}"
border = "{{colors.base03_source.default.hex}}"

# ============================================================================
# Window Borders
# ============================================================================

[colors.main_window]
border = "{{colors.base03_source.default.hex}}"

[colors.settings_window]
border = "{{colors.base03_source.default.hex}}"

# ============================================================================
# Accent Palette (dipertahankan tapi jarang dipakai)
# ============================================================================

[colors.accents]
blue = "{{colors.base0D_source.default.hex}}"
green = "{{colors.base0B_source.default.hex}}"
magenta = "{{colors.base0E_source.default.hex}}"
orange = "{{colors.base09_source.default.hex}}"
red = "{{colors.base08_source.default.hex}}"
yellow = "{{colors.base0A_source.default.hex}}"
cyan = "{{colors.base0C_source.default.hex}}"
purple = "{{colors.base0E_source.default.hex}}"

# ============================================================================
# Text System
# ============================================================================

[colors.text]
default = "{{colors.base05_source.default.hex}}"
muted = { name = "colors.text.default", darker = 60 }
danger = "{{colors.base08_source.default.hex}}"
success = "{{colors.base0B_source.default.hex}}"
placeholder = "colors.text.muted"

[colors.text.selection]
background = "{{colors.base02_source.default.hex}}"
foreground = "{{colors.base05_source.default.hex}}"

[colors.text.links]
default = "{{colors.base0D_source.default.hex}}"
visited = "{{colors.base0C_source.default.hex}}"

# ============================================================================
# Input Fields
# ============================================================================

[colors.input]
border = "{{colors.base03_source.default.hex}}"
border_focus = "{{colors.base04_source.default.hex}}"
border_error = "{{colors.base08_source.default.hex}}"

# ============================================================================
# Buttons
# ============================================================================

[colors.button.primary]
background = "{{colors.base01_source.default.hex}}"
foreground = "{{colors.base05_source.default.hex}}"

[colors.button.primary.hover]
background = "{{colors.base02_source.default.hex}}"

[colors.button.primary.focus]
outline = "{{colors.base04_source.default.hex}}"

# ============================================================================
# Lists (neutral, grayscale)
# ============================================================================

[colors.list.item.hover]
background = "{{colors.base01_source.default.hex}}"
foreground = "{{colors.base05_source.default.hex}}"

[colors.list.item.selection]
background = "{{colors.base02_source.default.hex}}"
foreground = "{{colors.base05_source.default.hex}}"

# ============================================================================
# Grid Items
# ============================================================================

[colors.grid.item]
background = "{{colors.base01_source.default.hex}}"

[colors.grid.item.hover]
outline = "{{colors.base03_source.default.hex}}"

[colors.grid.item.selection]
outline = "{{colors.base04_source.default.hex}}"

# ============================================================================
# Scrollbars
# ============================================================================

[colors.scrollbars]
background = "{{colors.base02_source.default.hex}}"

# ============================================================================
# Loading States (tetap pakai accent)
# ============================================================================

[colors.loading]
bar = "{{colors.base0D_source.default.hex}}"
spinner = "{{colors.base0D_source.default.hex}}"
